# fly.toml — AI Sales Dashboard frontend (Next.js)

app = 'ai-sales-dashboard-ui'
primary_region = 'dfw'

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = "https://sales.onpointpros.io"
    NEXT_PUBLIC_BACKEND_URL = "https://sales.onpointpros.io"

[env]
  BACKEND_INTERNAL_URL = "http://ai-sales-dashboard.internal:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpus = 1
